name: Deploy Demo Web

on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/configway-demo-web

jobs:
  test-unit:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: src/ConfigWay.UI/SPA/package-lock.json

      - name: Build SPA
        working-directory: src/ConfigWay.UI/SPA
        run: |
          npm ci
          npm run build

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.x
            9.x
            10.x
          dotnet-quality: preview

      - name: Restore
        run: dotnet restore src/ConfigWay.Tests/ConfigWay.Tests.csproj

      - name: Build
        run: dotnet build src/ConfigWay.Tests/ConfigWay.Tests.csproj --no-restore --configuration Release

      - name: Test
        run: >
          dotnet test src/ConfigWay.Tests/ConfigWay.Tests.csproj
          --no-build --configuration Release
          --logger "trx;LogFileName=unit-results.trx"

  test-postgres:
    name: PostgreSQL Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: src/ConfigWay.UI/SPA/package-lock.json

      - name: Build SPA
        working-directory: src/ConfigWay.UI/SPA
        run: |
          npm ci
          npm run build

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.x
            9.x
            10.x
          dotnet-quality: preview

      - name: Restore
        run: dotnet restore src/ConfigWay.PostgreSQL.Tests/ConfigWay.PostgreSQL.Tests.csproj

      - name: Build
        run: dotnet build src/ConfigWay.PostgreSQL.Tests/ConfigWay.PostgreSQL.Tests.csproj --no-restore --configuration Release

      - name: Test
        run: >
          dotnet test src/ConfigWay.PostgreSQL.Tests/ConfigWay.PostgreSQL.Tests.csproj
          --no-build --configuration Release
          --logger "trx;LogFileName=postgres-results.trx"

  push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: [test-unit, test-postgres]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: [push]
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          REPO_OWNER: ${{ github.repository_owner }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          envs: GHCR_TOKEN,REPO_OWNER
          script: |
            IMAGE="ghcr.io/$REPO_OWNER/configway-demo-web:latest"
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$REPO_OWNER" --password-stdin
            docker pull "$IMAGE"
            docker stop configway-demo-web || true
            docker rm configway-demo-web || true
            docker run -d \
              --name configway-demo-web \
              --restart unless-stopped \
              --network web \
              -e "ConnectionStrings__DemoDB=host=postgres;port=5432;database=configway;user id=postgres;password=postgres" \
              -e "ASPNETCORE_PATHBASE=/configway/demo" \
              "$IMAGE"
            docker network connect internal configway-demo-web
